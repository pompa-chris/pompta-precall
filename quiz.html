<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AC Pre-Call Flow — Knowledge Check | Dr. Pompa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --slate-900: #1b2a31;
        --slate-800: #243841;
        --slate-700: #2f4a56;
        --slate-600: #3f5b68;
        --slate-500: #5a7682;
        --slate-400: #89a0ab;
        --slate-300: #b5c6cd;
        --slate-200: #dce5e9;
        --slate-100: #edf1f3;
        --teal-700: #1e8f86;
        --teal-600: #2db3a6;
        --teal-500: #4ec5b9;
        --teal-400: #87d8d0;
        --teal-200: #c9eae6;
        --teal-100: #e6f5f2;
        --paper: #f7f3ed;
        --paper-deep: #efe8dc;
        --bone: #fbf9f4;
        --ink: #1a262c;
        --ink-soft: #3d5059;
        --alert: #b8472e;
        --alert-deep: #7d2f1f;
        --correct-bg: #e6f5f2;
        --correct-border: #2db3a6;
        --incorrect-bg: #fdf0ec;
        --incorrect-border: #b8472e;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        line-height: 1.6;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 20% 0%,
            rgba(45, 179, 166, 0.06) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 100%,
            rgba(30, 143, 134, 0.04) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }
      /* ── Nav ── */
      .site-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: var(--bone);
        border-bottom: 1px solid var(--slate-200);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        z-index: 200;
      }
      .nav-logo {
        display: flex;
        align-items: center;
        text-decoration: none;
      }
      .nav-logo img {
        height: 36px;
        width: auto;
      }
      .nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .nav-link {
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--slate-500);
        padding: 8px 16px;
        border-radius: 6px;
        transition: all 0.2s ease;
      }
      .nav-link:hover {
        color: var(--teal-700);
        background: var(--teal-100);
      }
      .nav-link.active {
        color: var(--teal-700);
        background: var(--teal-100);
      }

      .progress-bar {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        height: 56px;
        background: var(--bone);
        border-bottom: 1px solid var(--slate-200);
        display: flex;
        align-items: center;
        padding: 0 40px;
        z-index: 100;
        gap: 20px;
      }
      .progress-track {
        flex: 1;
        height: 6px;
        background: var(--slate-200);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--teal-700), var(--teal-500));
        border-radius: 3px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        width: 0%;
      }
      .progress-label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--slate-500);
        white-space: nowrap;
        min-width: 80px;
        text-align: right;
      }
      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 160px 32px 80px;
        position: relative;
        z-index: 1;
      }
      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }
      .start-screen {
        text-align: center;
        padding-top: 80px;
      }
      .eyebrow {
        font-family: "IBM Plex Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--teal-700);
        font-weight: 500;
        margin-bottom: 24px;
      }
      .start-title {
        font-family: "Outfit", sans-serif;
        font-size: 56px;
        font-weight: 500;
        letter-spacing: -0.025em;
        line-height: 1.05;
        color: var(--slate-800);
        margin-bottom: 24px;
      }
      .start-subtitle {
        font-size: 20px;
        color: var(--ink-soft);
        max-width: 540px;
        margin: 0 auto 48px;
        line-height: 1.5;
      }
      .start-meta {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-bottom: 56px;
      }
      .start-meta-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }
      .meta-num {
        font-family: "Outfit", sans-serif;
        font-size: 36px;
        font-weight: 400;
        color: var(--slate-800);
      }
      .meta-label {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--slate-500);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px 40px;
        border: none;
        border-radius: 8px;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .btn-primary {
        background: var(--teal-700);
        color: white;
      }
      .btn-primary:hover {
        background: var(--teal-600);
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(30, 143, 134, 0.3);
      }
      .btn-ghost {
        background: transparent;
        color: var(--slate-500);
        border: 1px solid var(--slate-300);
      }
      .btn-ghost:hover {
        background: var(--slate-100);
        color: var(--slate-700);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }
      .question-card {
        animation: fadeSlideIn 0.4s ease;
      }
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .scenario-badge {
        display: inline-flex;
        align-items: center;
        padding: 6px 14px;
        border-radius: 999px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .scenario-badge.happy-path {
        background: var(--teal-100);
        color: var(--teal-700);
      }
      .scenario-badge.non-responder {
        background: #fff3e0;
        color: #e65100;
      }
      .scenario-badge.spouse-escalation {
        background: #f3e5f5;
        color: #7b1fa2;
      }
      .scenario-badge.nta-chase {
        background: #e3f2fd;
        color: #1565c0;
      }
      .type-badge {
        display: inline-flex;
        padding: 4px 10px;
        border-radius: 4px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: var(--slate-100);
        color: var(--slate-600);
        margin-left: 8px;
      }
      .context-block {
        background: var(--slate-800);
        color: var(--slate-100);
        border-radius: 10px;
        padding: 24px 28px;
        margin-bottom: 28px;
        font-size: 15px;
        line-height: 1.6;
        position: relative;
      }
      .context-block::before {
        content: "SCENARIO";
        position: absolute;
        top: -10px;
        left: 20px;
        font-family: "IBM Plex Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--teal-400);
        background: var(--slate-800);
        padding: 0 8px;
      }
      .message-bubble {
        background: white;
        border: 1px solid var(--slate-200);
        border-left: 4px solid var(--teal-600);
        border-radius: 4px 10px 10px 4px;
        padding: 20px 24px;
        margin-bottom: 28px;
        font-size: 16px;
        line-height: 1.55;
        color: var(--ink);
      }
      .message-sender {
        font-family: "IBM Plex Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--slate-500);
        margin-bottom: 8px;
      }
      .flow-sequence {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-bottom: 28px;
      }
      .flow-step {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 20px;
        background: white;
        border: 1px solid var(--slate-200);
        font-size: 15px;
      }
      .flow-step:first-child {
        border-radius: 8px 8px 0 0;
      }
      .flow-step:last-child {
        border-radius: 0 0 8px 8px;
      }
      .flow-step + .flow-step {
        border-top: none;
      }
      .flow-step .step-num {
        font-family: "IBM Plex Mono", monospace;
        font-size: 13px;
        color: var(--slate-400);
        min-width: 24px;
      }
      .flow-step .step-name {
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        font-weight: 500;
        color: var(--teal-700);
      }
      .flow-step .step-desc {
        color: var(--ink-soft);
        font-size: 14px;
        margin-left: auto;
      }
      .flow-step.mystery {
        background: var(--teal-100);
        border-color: var(--teal-400);
        border-style: dashed;
      }
      .flow-step.mystery .step-name {
        font-size: 20px;
        color: var(--teal-700);
      }
      .question-text {
        font-family: "Outfit", sans-serif;
        font-size: 26px;
        font-weight: 500;
        color: var(--slate-800);
        line-height: 1.3;
        margin-bottom: 28px;
        letter-spacing: -0.01em;
      }
      .options-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 32px;
      }
      .option {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 18px 22px;
        background: white;
        border: 2px solid var(--slate-200);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s ease;
        font-size: 16px;
        line-height: 1.5;
      }
      .option:hover {
        border-color: var(--teal-500);
        background: var(--teal-100);
      }
      .option.selected {
        border-color: var(--teal-600);
        background: var(--teal-100);
      }
      .option.disabled {
        pointer-events: none;
      }
      .option.correct-answer {
        border-color: var(--correct-border);
        background: var(--correct-bg);
      }
      .option.incorrect-answer {
        border-color: var(--incorrect-border);
        background: var(--incorrect-bg);
      }
      .option-letter {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        min-width: 32px;
        border-radius: 50%;
        border: 2px solid var(--slate-300);
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        font-weight: 500;
        color: var(--slate-500);
        transition: all 0.15s ease;
      }
      .option.selected .option-letter {
        border-color: var(--teal-600);
        background: var(--teal-600);
        color: white;
      }
      .option.correct-answer .option-letter {
        border-color: var(--correct-border);
        background: var(--correct-border);
        color: white;
      }
      .option.incorrect-answer .option-letter {
        border-color: var(--incorrect-border);
        background: var(--incorrect-border);
        color: white;
      }
      .option-text {
        flex: 1;
        color: var(--ink);
      }
      .action-row {
        display: flex;
        justify-content: center;
        gap: 16px;
      }
      .feedback-panel {
        margin-top: 24px;
        padding: 24px 28px;
        border-radius: 8px;
        border-left: 4px solid;
        animation: feedbackSlide 0.35s ease;
        font-size: 15px;
        line-height: 1.6;
      }
      @keyframes feedbackSlide {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .feedback-panel.correct {
        background: var(--correct-bg);
        border-left-color: var(--correct-border);
      }
      .feedback-panel.incorrect {
        background: var(--incorrect-bg);
        border-left-color: var(--incorrect-border);
      }
      .feedback-header {
        font-family: "Outfit", sans-serif;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .feedback-panel.correct .feedback-header {
        color: var(--teal-700);
      }
      .feedback-panel.incorrect .feedback-header {
        color: var(--alert);
      }
      .feedback-text {
        color: var(--ink-soft);
      }
      .scorecard {
        text-align: center;
        animation: fadeSlideIn 0.5s ease;
      }
      .scorecard-eyebrow {
        font-family: "IBM Plex Mono", monospace;
        font-size: 16px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--teal-700);
        margin-bottom: 16px;
      }
      .score-big {
        font-family: "Outfit", sans-serif;
        font-size: 96px;
        font-weight: 300;
        color: var(--slate-800);
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .score-pct {
        font-family: "Outfit", sans-serif;
        font-size: 48px;
        font-weight: 300;
        color: var(--slate-500);
        margin-bottom: 48px;
      }
      .breakdown {
        max-width: 520px;
        margin: 0 auto 48px;
        text-align: left;
      }
      .breakdown-row {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 0;
        border-bottom: 1px solid var(--slate-200);
      }
      .breakdown-label {
        font-size: 15px;
        color: var(--ink);
        min-width: 160px;
      }
      .breakdown-bar {
        flex: 1;
        height: 8px;
        background: var(--slate-200);
        border-radius: 4px;
        overflow: hidden;
      }
      .breakdown-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, var(--teal-700), var(--teal-500));
        transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .breakdown-score {
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        color: var(--slate-500);
        min-width: 40px;
        text-align: right;
      }
      .missed-section {
        text-align: left;
        max-width: 640px;
        margin: 0 auto 48px;
      }
      .missed-heading {
        font-family: "IBM Plex Mono", monospace;
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--slate-500);
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 2px solid var(--slate-800);
      }
      .missed-item {
        padding: 20px 0;
        border-bottom: 1px solid var(--slate-200);
      }
      .missed-q {
        font-family: "Outfit", sans-serif;
        font-size: 17px;
        font-weight: 500;
        color: var(--slate-800);
        margin-bottom: 10px;
      }
      .missed-yours {
        font-size: 14px;
        color: var(--alert);
        margin-bottom: 4px;
      }
      .missed-correct {
        font-size: 14px;
        color: var(--teal-700);
      }
      .scorecard-actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 40px;
      }
      @media (max-width: 640px) {
        .site-nav {
          padding: 0 16px;
        }
        .container {
          padding: 140px 16px 60px;
        }
        .start-title {
          font-size: 36px;
        }
        .question-text {
          font-size: 22px;
        }
        .score-big {
          font-size: 64px;
        }
        .start-meta {
          flex-direction: column;
          gap: 16px;
        }
        .progress-bar {
          padding: 0 16px;
        }
        .context-block {
          padding: 18px 20px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="Dr. Pompa" />
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="quiz.html" class="nav-link active">Quiz</a>
        <a href="simulator.html" class="nav-link">Simulator</a>
      </div>
    </nav>

    <div class="progress-bar" id="progressBar" style="display: none">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">Q 1 of 20</div>
    </div>

    <div class="container">
      <div class="screen active" id="startScreen">
        <div class="start-screen">
          <div class="eyebrow">AC Team Onboarding</div>
          <div class="start-title">Pre-Call Flow Knowledge Check</div>
          <p class="start-subtitle">
            Test your understanding of the AC pre-call flow after reviewing the
            Interactive Training Simulator. Immediate feedback on every
            question.
          </p>
          <div class="start-meta">
            <div class="start-meta-item">
              <span class="meta-num">20</span
              ><span class="meta-label">Questions</span>
            </div>
            <div class="start-meta-item">
              <span class="meta-num">3</span
              ><span class="meta-label">Types</span>
            </div>
            <div class="start-meta-item">
              <span class="meta-num">4</span
              ><span class="meta-label">Scenarios</span>
            </div>
          </div>
          <button class="btn btn-primary" id="startBtn">Begin Quiz</button>
        </div>
      </div>
      <div class="screen" id="questionScreen"></div>
      <div class="screen" id="scorecardScreen"></div>
    </div>

    <script>
      (function () {
        "use strict";

        var QUESTIONS = [
          {
            type: "MC",
            scenario: "Happy Path",
            context:
              "Client: Sarah Mitchell | Denver, CO | HA: Tiger | Appt: Apr 22, 2:00 PM ET\nConcern: brain fog, fatigue\n\nSarah replies to the automated SMS: \u201cHonestly, the brain fog is the worst. I can\u2019t even think straight by 2pm. I\u2019ve tried everything \u2014 supplements, cleanses, you name it.\u201d",
            question:
              "Sarah just replied to the automated SMS with detailed health info. What\u2019s your first move?",
            options: [
              "Send .discovery to ask about her health concerns",
              "Send .verify to confirm her email and timezone",
              "Send a warm intro with a real-person signal, then acknowledge her health info",
              "Send .nta with the questionnaire link",
            ],
            correct: 2,
            explanation:
              "When a client replies to the automated SMS with health info, your first message must signal you\u2019re a real person (not another bot) AND acknowledge what they shared. This is a warm intro \u2014 she already engaged, so meet her where she is.",
          },
          {
            type: "RW",
            scenario: "Happy Path",
            context:
              "Client: Jessica Torres | Tampa, FL | HA: Mike | Appt: Apr 24, 1:00 PM ET\nConcern: chronic fatigue, weight gain\n\nJessica replied to the automated SMS: \u201cI\u2019m exhausted all the time. I\u2019ve gained 30 lbs in the last year and nothing helps.\u201d\n\nBriana (Texter) sends this response:",
            message:
              "Hi Jessica! Can you confirm your email address so we can get your file set up?",
            question: "Is this an acceptable first response from Briana?",
            options: [
              "Yes \u2014 email verification is the top priority",
              "No \u2014 it skips the real-person signal and ignores Jessica\u2019s health info entirely",
              "No \u2014 it should ask for phone number too",
              "Yes \u2014 but it should also include the NTA link",
            ],
            correct: 1,
            explanation:
              "This message reads like another automated system. It ignores everything Jessica shared about her health, has no real-person signal, and jumps straight to data collection. The AC should first acknowledge her health info, show they\u2019re a real person, and THEN handle logistics.",
          },
          {
            type: "MC",
            scenario: "Happy Path",
            context:
              "Client: Amanda Chen | Portland, OR | HA: Bre | Appt: Apr 23, 3:00 PM ET\nConcern: migraines, digestive issues\n\nAmanda already told you: \u201cThe migraines are ruining my life. I get them 3-4 times a week and my stomach is a mess. I\u2019ve been to every specialist.\u201d\n\nYou haven\u2019t acknowledged her health info yet \u2014 this is a new conversation and you\u2019re deciding what template to send.",
            question:
              "You\u2019re about to send .discovery, but Amanda already shared her #1 health concern. What do you do?",
            options: [
              "Send .discovery anyway \u2014 the template requires it",
              "Skip .discovery entirely and move to .nta",
              "Acknowledge what she shared, empower her, and skip the redundant question",
              "Ask a follow-up question about her symptoms for more detail",
            ],
            correct: 2,
            explanation:
              "She already answered the discovery question in her SMS reply. But you can\u2019t just skip past it silently \u2014 you need to acknowledge her specific concern (\u201cthe migraines\u201d), empower her (\u201cyou\u2019re in the right place\u201d), and then move forward. Skipping without acknowledging feels like you didn\u2019t read her message.",
          },
          {
            type: "FITF",

        var SCENARIO_KEYS = {
          "Happy Path": "happy-path",
          "Non-Responder": "non-responder",
          "Spouse Escalation": "spouse-escalation",
          "24hr NTA Chase": "nta-chase",
        };
        var LETTERS = ["A", "B", "C", "D"];
        var currentQ = 0;
        var answers = [];
        var submitted = false;

        function el(id) {
          return document.getElementById(id);
        }

        function createEl(tag, cls, text) {
          var e = document.createElement(tag);
          if (cls) e.className = cls;
          if (text) e.textContent = text;
          return e;
        }

        function clearChildren(node) {
          while (node.firstChild) node.removeChild(node.firstChild);
        }

        document
          .getElementById("startBtn")
          .addEventListener("click", function () {
            el("startScreen").classList.remove("active");
            el("questionScreen").classList.add("active");
            el("progressBar").style.display = "flex";
            answers = new Array(QUESTIONS.length).fill(-1);
            currentQ = 0;
            submitted = false;
            renderQuestion();
          });

        function renderQuestion() {
          var q = QUESTIONS[currentQ];
          var screen = el("questionScreen");
          clearChildren(screen);

          var card = createEl("div", "question-card");

          // Badge row
          var badgeRow = createEl("div", "");
          badgeRow.style.cssText =
            "display:flex;align-items:center;gap:8px;margin-bottom:20px";
          var sBadge = createEl(
            "span",
            "scenario-badge " + SCENARIO_KEYS[q.scenario],
            q.scenario,
          );
          var tBadge = createEl("span", "type-badge", q.type);
          badgeRow.appendChild(sBadge);
          badgeRow.appendChild(tBadge);
          card.appendChild(badgeRow);

          // Context block
          var ctx = createEl("div", "context-block");
          q.context.split("\n").forEach(function (line, i) {
            if (i > 0) ctx.appendChild(document.createElement("br"));
            ctx.appendChild(document.createTextNode(line));
          });
          card.appendChild(ctx);

          // Message bubble (RW)
          if (q.type === "RW" && q.message) {
            var bubble = createEl("div", "message-bubble");
            var sender = createEl("div", "message-sender", "AC Message");
            bubble.appendChild(sender);
            bubble.appendChild(document.createTextNode(q.message));
            card.appendChild(bubble);
          }

          // Flow sequence (FITF)
          if (q.type === "FITF" && q.flowSteps) {
            var seq = createEl("div", "flow-sequence");
            q.flowSteps.forEach(function (step, i) {
              var fs = createEl(
                "div",
                "flow-step" + (step.mystery ? " mystery" : ""),
              );
              fs.appendChild(createEl("span", "step-num", String(i + 1)));
              fs.appendChild(createEl("span", "step-name", step.name));
              if (step.desc)
                fs.appendChild(createEl("span", "step-desc", step.desc));
              seq.appendChild(fs);
            });
            card.appendChild(seq);
          }

          // Question text
          card.appendChild(createEl("div", "question-text", q.question));

          // Options
          var optList = createEl("div", "options-list");
          optList.id = "optionsList";
          q.options.forEach(function (opt, i) {
            var optDiv = createEl("div", "option");
            optDiv.setAttribute("data-idx", i);
            optDiv.addEventListener("click", function () {
              selectOption(i);
            });
            optDiv.appendChild(createEl("span", "option-letter", LETTERS[i]));
            optDiv.appendChild(createEl("span", "option-text", opt));
            optList.appendChild(optDiv);
          });
          card.appendChild(optList);

          // Submit button
          var actionRow = createEl("div", "action-row");
          var submitBtn = createEl(
            "button",
            "btn btn-primary",
            "Submit Answer",
          );
          submitBtn.id = "submitBtn";
          submitBtn.disabled = true;
          submitBtn.addEventListener("click", submitAnswer);
          actionRow.appendChild(submitBtn);
          card.appendChild(actionRow);

          // Feedback area
          var fbArea = createEl("div", "");
          fbArea.id = "feedbackArea";
          card.appendChild(fbArea);

          screen.appendChild(card);
          updateProgress();
          submitted = false;
        }

        function selectOption(idx) {
          if (submitted) return;
          answers[currentQ] = idx;
          var opts = document.querySelectorAll(".option");
          opts.forEach(function (o) {
            o.classList.remove("selected");
          });
          opts[idx].classList.add("selected");
          el("submitBtn").disabled = false;
        }

        function submitAnswer() {
          if (submitted || answers[currentQ] === -1) return;
          submitted = true;
          var q = QUESTIONS[currentQ];
          var chosen = answers[currentQ];
          var isCorrect = chosen === q.correct;

          var opts = document.querySelectorAll(".option");
          opts.forEach(function (o) {
            o.classList.add("disabled");
          });
          opts[q.correct].classList.add("correct-answer");
          if (!isCorrect) opts[chosen].classList.add("incorrect-answer");

          var fbArea = el("feedbackArea");

          var panel = createEl(
            "div",
            "feedback-panel " + (isCorrect ? "correct" : "incorrect"),
          );
          panel.appendChild(
            createEl(
              "div",
              "feedback-header",
              isCorrect ? "\u2713 Correct!" : "\u2717 Incorrect",
            ),
          );
          panel.appendChild(createEl("div", "feedback-text", q.explanation));
          fbArea.appendChild(panel);

          var nextRow = createEl("div", "action-row");
          nextRow.style.marginTop = "20px";
          var nextBtn = createEl(
            "button",
            "btn btn-primary",
            currentQ < QUESTIONS.length - 1
              ? "Next Question \u2192"
              : "See Results",
          );
          nextBtn.addEventListener("click", nextQuestion);
          nextRow.appendChild(nextBtn);
          fbArea.appendChild(nextRow);

          el("submitBtn").style.display = "none";
        }

        function nextQuestion() {
          currentQ++;
          if (currentQ >= QUESTIONS.length) {
            showScorecard();
          } else {
            renderQuestion();
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        }

        function updateProgress() {
          var pct = (currentQ / QUESTIONS.length) * 100;
          el("progressFill").style.width = pct + "%";
          el("progressLabel").textContent =
            "Q " + (currentQ + 1) + " of " + QUESTIONS.length;
        }

        function showScorecard() {
          el("questionScreen").classList.remove("active");
          el("scorecardScreen").classList.add("active");
          el("progressFill").style.width = "100%";
          el("progressLabel").textContent = "Complete";

          var total = QUESTIONS.length;
          var correct = 0;
          var missed = [];
          var scenarioScores = {};

          QUESTIONS.forEach(function (q, i) {
            if (!scenarioScores[q.scenario])
              scenarioScores[q.scenario] = { correct: 0, total: 0 };
            scenarioScores[q.scenario].total++;
            if (answers[i] === q.correct) {
              correct++;
              scenarioScores[q.scenario].correct++;
            } else {
              missed.push({ idx: i, q: q, chosen: answers[i] });
            }
          });

          var pct = Math.round((correct / total) * 100);
          var screen = el("scorecardScreen");
          clearChildren(screen);

          var sc = createEl("div", "scorecard");
          sc.appendChild(createEl("div", "scorecard-eyebrow", "Your Results"));
          sc.appendChild(createEl("div", "score-big", correct + " / " + total));
          sc.appendChild(createEl("div", "score-pct", pct + "%"));

          // Breakdown
          var bd = createEl("div", "breakdown");
          [
            "Happy Path",
            "Non-Responder",
            "Spouse Escalation",
            "24hr NTA Chase",
          ].forEach(function (s) {
            var d = scenarioScores[s];
            if (!d) return;
            var barPct = Math.round((d.correct / d.total) * 100);
            var row = createEl("div", "breakdown-row");
            row.appendChild(createEl("span", "breakdown-label", s));
            var bar = createEl("div", "breakdown-bar");
            var fill = createEl("div", "breakdown-bar-fill");
            fill.style.width = barPct + "%";
            bar.appendChild(fill);
            row.appendChild(bar);
            row.appendChild(
              createEl("span", "breakdown-score", d.correct + "/" + d.total),
            );
            bd.appendChild(row);
          });
          sc.appendChild(bd);

          // Missed questions
          if (missed.length > 0) {
            var ms = createEl("div", "missed-section");
            ms.appendChild(
              createEl("div", "missed-heading", "Review Missed Questions"),
            );
            missed.forEach(function (m) {
              var item = createEl("div", "missed-item");
              item.appendChild(
                createEl(
                  "div",
                  "missed-q",
                  "Q" + (m.idx + 1) + ": " + m.q.question,
                ),
              );
              item.appendChild(
                createEl(
                  "div",
                  "missed-yours",
                  "\u2717 You chose: " +
                    LETTERS[m.chosen] +
                    " \u2014 " +
                    m.q.options[m.chosen],
                ),
              );
              item.appendChild(
                createEl(
                  "div",
                  "missed-correct",
                  "\u2713 Correct: " +
                    LETTERS[m.q.correct] +
                    " \u2014 " +
                    m.q.options[m.q.correct],
                ),
              );
              ms.appendChild(item);
            });
            sc.appendChild(ms);
          }

          // Actions
          var actions = createEl("div", "scorecard-actions");
          var retakeBtn = createEl("button", "btn btn-primary", "Retake Quiz");
          retakeBtn.addEventListener("click", retakeQuiz);
          actions.appendChild(retakeBtn);
          var simBtn = createEl("button", "btn btn-ghost", "Back to Simulator");
          simBtn.addEventListener("click", function () {
            window.location.href = "simulator.html";
          });
          actions.appendChild(simBtn);
          sc.appendChild(actions);

          screen.appendChild(sc);
          window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function retakeQuiz() {
          QUESTIONS.forEach(function (q) {
            var correctText = q.options[q.correct];
            var shuffled = q.options.slice();
            for (var i = shuffled.length - 1; i > 0; i--) {
              var j = Math.floor(Math.random() * (i + 1));
              var tmp = shuffled[i];
              shuffled[i] = shuffled[j];
              shuffled[j] = tmp;
            }
            q.options = shuffled;
            q.correct = shuffled.indexOf(correctText);
          });

          el("scorecardScreen").classList.remove("active");
          el("questionScreen").classList.add("active");
          currentQ = 0;
          answers = new Array(QUESTIONS.length).fill(-1);
          submitted = false;
          renderQuestion();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      })();
    </script>
  </body>
</html>
